<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartRoad Admin — Manage Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="navbar">
    <span class="brand">SmartRoad Admin</span>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="reports.html">Manage Reports</a>
      <a href="#" id="logoutLink">Log Out</a>
    </div>
  </div>

  <div class="container">
    <h2>Manage Reports</h2>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search description or hazard type..." />

      <select id="filterType">
        <option value="">All Types</option>
        <option value="Pothole">Pothole</option>
        <option value="Flood">Flood</option>
        <option value="Accident">Accident</option>
        <option value="Fallen Tree">Fallen Tree</option>
        <option value="Traffic Light">Traffic Light</option>
        <option value="Damaged Road Sign">Damaged Road Sign</option>
      </select>

      <select id="filterStatus">
        <option value="">All Statuses</option>
        <option value="New">New</option>
        <option value="Under Investigation">Under Investigation</option>
        <option value="Resolved">Resolved</option>
      </select>

      <input type="date" id="filterDate" />

      <button class="btn-secondary" id="clearFilters">Clear Filters</button>
      <button class="btn-primary" id="openAddReportBtn" style="margin-top:0;">+ Add Report</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Photo</th>
          <th>Hazard Type</th>
          <th>Description</th>
          <th>Status</th>
          <th>Date</th>
          <th>Reported By</th>
        </tr>
      </thead>
      <tbody id="reportsTableBody"></tbody>
    </table>

    <div class="empty-state" id="emptyState" style="display:none;">No reports match your filters.</div>
  </div>

  <div class="modal-overlay" id="addReportOverlay" style="display:none;">
    <form class="modal-card" id="addReportForm">
      <h3>Add Hazard Report</h3>

      <label for="newHazardType">Hazard Type</label>
      <select id="newHazardType">
        <option value="Pothole">Pothole</option>
        <option value="Flood">Flood</option>
        <option value="Accident">Accident</option>
        <option value="Fallen Tree">Fallen Tree</option>
        <option value="Traffic Light">Traffic Light</option>
        <option value="Damaged Road Sign">Damaged Road Sign</option>
      </select>

      <label for="newDescription">Description</label>
      <textarea id="newDescription" rows="3" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px; font-size:14px;"></textarea>

      <label for="newStatus">Status</label>
      <select id="newStatus">
        <option value="New">New</option>
        <option value="Under Investigation">Under Investigation</option>
        <option value="Resolved">Resolved</option>
      </select>

      <label for="newLatitude">Latitude</label>
      <input type="number" id="newLatitude" step="any" placeholder="e.g. 3.1390" />

      <label for="newLongitude">Longitude</label>
      <input type="number" id="newLongitude" step="any" placeholder="e.g. 101.6869" />

      <label for="newPhoto">Photo (optional)</label>
      <input type="file" id="newPhoto" accept="image/*" />

      <div class="error-text" id="addReportError"></div>

      <div class="actions-bar">
        <button type="submit" class="btn-primary" style="margin-top:0;">Save Report</button>
        <button type="button" class="btn-secondary" id="cancelAddReportBtn">Cancel</button>
      </div>
    </form>
  </div>

  <script type="module" src="js/reports.js"></script>
</body>
</html>
